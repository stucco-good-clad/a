[package]
name = "solana-backfill"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls", "webpki-roots", "brotli", "deflate", "gzip"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "macros", "sync", "time", "parking_lot"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.release.package."*"]
opt-level = 3
