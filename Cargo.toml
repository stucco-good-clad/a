[package]
name = "solana-backfill"
version = "0.2.0"
edition = "2021"

[dependencies]
# reqwest: rustls + HTTP/2 + compression codecs; no openssl dep
reqwest = { version = "0.12", default-features = false, features = [
    "json",
    "rustls-tls",
    "http2",
    "brotli",
    "deflate",
    "gzip",
] }
bytes   = "1"           # zero-copy body reuse across retries
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
clap  = { version = "4", features = ["derive"] }
anyhow = "1"

[profile.release]
opt-level   = 3
lto         = "fat"         # whole-program link-time optimisation
codegen-units = 1           # single CGU for max inlining
strip       = "symbols"     # smaller binary, keeps panic messages
panic       = "abort"       # no unwinding overhead

[profile.release.package."*"]
opt-level = 3
