[package]
name = "solana-backfill"
version = "0.3.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = [
    "json", "rustls-tls", "http2", "brotli", "deflate", "gzip",
] }
bytes        = "1"
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
tokio        = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "io-util"] }
clap         = { version = "4", features = ["derive"] }
anyhow       = "1"
governor     = "0.6"          # token-bucket rate limiter, one per endpoint
nonzero_ext  = "0.3"          # nonzero! macro for governor
flate2       = "1"            # gzip compress output files

[profile.release]
opt-level     = 3
lto           = "fat"
codegen-units = 1
strip         = "symbols"
panic         = "abort"

[profile.release.package."*"]
opt-level = 3
