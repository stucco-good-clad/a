name: CounterA
on:
  push:
  workflow_run:
    workflows: ["CounterB"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.counter.outputs.count }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Read and increment counter
        id: counter
        run: |
          COUNTER=$(cat counter.txt)
          COUNTER=$((COUNTER + 1))
          echo "$COUNTER" > counter.txt
          echo "count=$COUNTER" >> "$GITHUB_OUTPUT"
          echo "Counter is now: $COUNTER"

      - name: Commit counter
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add counter.txt
          git commit -m "A: increment counter to ${{ steps.counter.outputs.count }}"
          git push
