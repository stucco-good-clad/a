name: benchmark-onfinality

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Detect OnFinality keys
        id: detect-of
        env:
          ON1: ${{ secrets.on1 }}
          ON2: ${{ secrets.on2 }}
          ON3: ${{ secrets.on3 }}
          ON4: ${{ secrets.on4 }}
          ON5: ${{ secrets.on5 }}
        run: |
          set +e
          KEYS=""
          for N in 1 2 3 4 5; do
            VAR="ON${N}"
            VAL="${!VAR}"
            if [ -n "$VAL" ]; then
              if [ -n "$KEYS" ]; then KEYS="${KEYS},"; fi
              KEYS="${KEYS}${VAL}"
              echo "on${N}: ${VAL:0:8}..."
            fi
          done
          N=$(echo "$KEYS" | tr ',' '\n' | wc -l)
          if [ "$N" -eq 0 ] || [ -z "$KEYS" ]; then
            echo "ERROR: No OnFinality keys found" >&2
            exit 1
          fi
          echo "total: ${N} keys"
          echo "n=${N}" >> "$GITHUB_OUTPUT"
          echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"

      - name: Get test slot
        id: get-slot
        env:
          ON1: ${{ secrets.on1 }}
        run: |
          SLOT=$(curl -s -X POST "https://solana.api.onfinality.io/rpc?apikey=${ON1}" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}' \
            | jq -r '.result')
          TEST_SLOT=$((SLOT - 1000))
          echo "Current slot: ${SLOT}"
          echo "Test slot: ${TEST_SLOT}"
          echo "slot=${TEST_SLOT}" >> "$GITHUB_OUTPUT"

      - name: Benchmark 10 parallel getBlock full
        env:
          KEYS: ${{ steps.detect-of.outputs.keys }}
          SLOT: ${{ steps.get-slot.outputs.slot }}
        run: |
          set -euo pipefail

          IFS=',' read -ra KEY_ARRAY <<< "$KEYS"
          N=${#KEY_ARRAY[@]}

          echo "=== 10 parallel getBlock full ==="
          echo "Slot: ${SLOT}"
          echo "Keys: ${N}"
          echo ""

          # Get response size from first call
          API_KEY="${KEY_ARRAY[0]}"
          URL="https://solana.api.onfinality.io/rpc?apikey=${API_KEY}"
          SIZE_BYTES=$(curl -s -X POST "$URL" \
            -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"json\",\"transactionDetails\":\"full\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}" \
            | wc -c)
          SIZE_MB=$(echo "scale=2; ${SIZE_BYTES} / 1048576" | bc)
          echo "Response size: ${SIZE_MB} MB"
          echo ""

          # Fire 10 requests in parallel
          START_NS=$(date +%s%N)

          for i in $(seq 1 10); do
            KEY_IDX=$(( (i - 1) % N ))
            API_KEY="${KEY_ARRAY[$KEY_IDX]}"
            URL="https://solana.api.onfinality.io/rpc?apikey=${API_KEY}"
            OUT="/tmp/block_${i}.json"

            curl -s -o "$OUT" -w "req${i}: HTTP %{http_code}  %{time_total}s\n" \
              -X POST "$URL" \
              -H "Content-Type: application/json" \
              -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"json\",\"transactionDetails\":\"full\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}" &

          done

          wait

          END_NS=$(date +%s%N)
          TOTAL_MS=$(( (END_NS - START_NS) / 1000000 ))

          echo ""
          echo "=== ALL 10 FINISHED ==="
          echo "Wall-clock time (parallel): ${TOTAL_MS} ms"
          echo "Theoretical per-block if serial: ${TOTAL_MS}0 ms"
          echo ""

          # Check all files have content
          echo "Response sizes:"
          for i in $(seq 1 10); do
            if [ -f "/tmp/block_${i}.json" ]; then
              FSIZE=$(wc -c < "/tmp/block_${i}.json")
              FSIZE_MB=$(echo "scale=2; ${FSIZE} / 1048576" | bc)
              printf "  block_%d: %s MB\n" "$i" "$FSIZE_MB"
            else
              printf "  block_%d: MISSING\n" "$i"
            fi
          done
