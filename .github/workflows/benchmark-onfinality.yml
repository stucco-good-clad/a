name: benchmark-onfinality

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Detect OnFinality keys
        id: detect-of
        env:
          ON1: ${{ secrets.on1 }}
          ON2: ${{ secrets.on2 }}
          ON3: ${{ secrets.on3 }}
          ON4: ${{ secrets.on4 }}
          ON5: ${{ secrets.on5 }}
        run: |
          set +e
          KEYS=""
          for N in 1 2 3 4 5; do
            VAR="ON${N}"
            VAL="${!VAR}"
            if [ -n "$VAL" ]; then
              if [ -n "$KEYS" ]; then KEYS="${KEYS},"; fi
              KEYS="${KEYS}${VAL}"
              echo "on${N}: ${VAL:0:8}..."
            fi
          done
          N=$(echo "$KEYS" | tr ',' '\n' | wc -l)
          if [ "$N" -eq 0 ] || [ -z "$KEYS" ]; then
            echo "ERROR: No OnFinality keys found" >&2
            exit 1
          fi
          echo "total: ${N} keys"
          echo "n=${N}" >> "$GITHUB_OUTPUT"
          echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"

      - name: Get a recent slot number
        id: get-slot
        env:
          ON1: ${{ secrets.on1 }}
        run: |
          SLOT=$(curl -s -X POST "https://solana.api.onfinality.io/rpc?apikey=${ON1}" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}' \
            | jq -r '.result')
          # Use slot 1000 behind current to ensure it's finalized
          TEST_SLOT=$((SLOT - 1000))
          echo "Current slot: ${SLOT}"
          echo "Test slot: ${TEST_SLOT}"
          echo "slot=${TEST_SLOT}" >> "$GITHUB_OUTPUT"

      - name: Benchmark getBlock full (10 iterations, all keys)
        env:
          KEYS: ${{ steps.detect-of.outputs.keys }}
          SLOT: ${{ steps.get-slot.outputs.slot }}
        run: |
          set -euo pipefail

          IFS=',' read -ra KEY_ARRAY <<< "$KEYS"
          N=${#KEY_ARRAY[@]}

          echo "=== getBlock full benchmark ==="
          echo "Slot: ${SLOT}"
          echo "Keys: ${N}"
          echo "Each iteration: pick a random key, call getBlock full, measure wall-clock time"
          echo ""

          TOTAL_MS=0
          MIN_MS=999999
          MAX_MS=0

          for i in $(seq 1 10); do
            KEY_IDX=$((RANDOM % N))
            API_KEY="${KEY_ARRAY[$KEY_IDX]}"
            URL="https://solana.api.onfinality.io/rpc?apikey=${API_KEY}"

            START_NS=$(date +%s%N)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$URL" \
              -H "Content-Type: application/json" \
              -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"json\",\"transactionDetails\":\"full\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}")
            END_NS=$(date +%s%N)

            ELAPSED_MS=$(( (END_NS - START_NS) / 1000000 ))
            TOTAL_MS=$((TOTAL_MS + ELAPSED_MS))

            if [ "$ELAPSED_MS" -lt "$MIN_MS" ]; then MIN_MS=$ELAPSED_MS; fi
            if [ "$ELAPSED_MS" -gt "$MAX_MS" ]; then MAX_MS=$ELAPSED_MS; fi

            # Get response size for the first call only (to avoid re-downloading)
            if [ "$i" -eq 1 ]; then
              SIZE_BYTES=$(curl -s -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"json\",\"transactionDetails\":\"full\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}" \
                | wc -c)
              SIZE_MB=$(echo "scale=2; ${SIZE_BYTES} / 1048576" | bc)
              echo "Response size: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
              echo ""
            fi

            printf "  [%2d/10] key%d  HTTP %s  %d ms\n" "$i" "$((KEY_IDX + 1))" "$HTTP_CODE" "$ELAPSED_MS"
          done

          AVG_MS=$((TOTAL_MS / 10))
          echo ""
          echo "=== RESULTS ==="
          echo "  Min:    ${MIN_MS} ms"
          echo "  Max:    ${MAX_MS} ms"
          echo "  Avg:    ${AVG_MS} ms"
          echo "  Blocks/s (serial): $(echo "scale=2; 1000 / ${AVG_MS}" | bc)"
          echo "  Theoretical 5-key parallel: $(echo "scale=2; 5000 / ${AVG_MS}" | bc) blocks/s"
