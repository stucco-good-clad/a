name: batch-blocks

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  RPC_URL: http://slc.rpc.orbitflare.com
  NUM_BLOCKS: 1000
  BATCH_SIZE: 10

permissions:
  contents: write

jobs:
  batch-blocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: batch-blocks

      - name: Build optimized binary
        working-directory: batch-blocks
        run: cargo build --release

      - name: Detect valid blocks via getBlocks and fetch all
        working-directory: batch-blocks
        id: fetch
        run: ./target/release/batch-blocks
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          KEY_2: ${{ secrets.KEY_2 }}
          KEY_3: ${{ secrets.KEY_3 }}
          KEY_4: ${{ secrets.KEY_4 }}
          KEY_5: ${{ secrets.KEY_5 }}
          KEY_6: ${{ secrets.KEY_6 }}
          KEY_7: ${{ secrets.KEY_7 }}
          KEY_8: ${{ secrets.KEY_8 }}
          KEY_9: ${{ secrets.KEY_9 }}
          KEY_10: ${{ secrets.KEY_10 }}

      - name: Create release with actual block range
        id: range
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RANGE=$(cat batch-blocks/range.txt)
          START="${RANGE%%-*}"
          END="${RANGE#*-}"
          echo "Actual block range: ${RANGE}"
          echo "start=${START}" >> "${GITHUB_OUTPUT}"
          echo "end=${END}" >> "${GITHUB_OUTPUT}"
          gh release create "blocks-${RANGE}" \
            --title "Blocks ${RANGE}" \
            --notes ""

      - name: Upload block files to release (batches of 50)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="blocks-${{ steps.range.outputs.start }}-${{ steps.range.outputs.end }}"
          cd batch-blocks
          TOTAL=$(ls -1 [0-9]*.txt | wc -l)
          echo "Uploading ${TOTAL} block files to release: ${TAG}"
          BATCH=0
          UPLOADED=0
          while IFS= read -r -d '' f; do
            files+=("$f")
            if [[ ${#files[@]} -eq 50 ]]; then
              BATCH=$((BATCH + 1))
              echo "  Batch ${BATCH}: uploading ${#files[@]} files..."
              gh release upload "${TAG}" "${files[@]}" --clobber
              UPLOADED=$((UPLOADED + ${#files[@]}))
              echo "  Batch ${BATCH}: done (${UPLOADED}/${TOTAL})"
              files=()
            fi
          done < <(find . -maxdepth 1 -name '[0-9]*.txt' -print0)
          # Upload remaining files
          if [[ ${#files[@]} -gt 0 ]]; then
            BATCH=$((BATCH + 1))
            echo "  Batch ${BATCH}: uploading ${#files[@]} files..."
            gh release upload "${TAG}" "${files[@]}" --clobber
            UPLOADED=$((UPLOADED + ${#files[@]}))
            echo "  Batch ${BATCH}: done (${UPLOADED}/${TOTAL})"
          fi
          echo "Upload complete: ${UPLOADED} files uploaded to ${TAG}"
