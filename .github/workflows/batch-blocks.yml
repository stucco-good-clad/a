name: batch-blocks

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  RPC_URL: http://slc.rpc.orbitflare.com
  NUM_BLOCKS: 1000
  BATCH_SIZE: 10

permissions:
  contents: write

jobs:
  batch-blocks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: batch-blocks

      - name: Get current slot for release name
        id: range
        env:
          KEY_1: ${{ secrets.KEY_1 }}
        run: |
          SLOT=$(curl -s -X POST "${RPC_URL}?api_key=${KEY_1}" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"getSlot"}' \
            | jq -r '.result')
          echo "Current slot: ${SLOT}"
          END=$(( SLOT - 2 ))
          START=$(( END - NUM_BLOCKS + 1 ))
          echo "Range: ${START}-${END}"
          echo "start=${START}" >> "${GITHUB_OUTPUT}"
          echo "end=${END}" >> "${GITHUB_OUTPUT}"

      - name: Create empty release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          START="${{ steps.range.outputs.start }}"
          END="${{ steps.range.outputs.end }}"
          gh release create "blocks-${START}-${END}" \
            --title "Blocks ${START}-${END}" \
            --notes ""

      - name: Build optimized binary
        working-directory: batch-blocks
        run: cargo build --release

      - name: Fetch 1000 valid blocks using getBlocks
        working-directory: batch-blocks
        run: ./target/release/batch-blocks
        env:
          RANGE_START: ${{ steps.range.outputs.start }}
          RANGE_END: ${{ steps.range.outputs.end }}
          KEY_1: ${{ secrets.KEY_1 }}
          KEY_2: ${{ secrets.KEY_2 }}
          KEY_3: ${{ secrets.KEY_3 }}
          KEY_4: ${{ secrets.KEY_4 }}
          KEY_5: ${{ secrets.KEY_5 }}
          KEY_6: ${{ secrets.KEY_6 }}
          KEY_7: ${{ secrets.KEY_7 }}
          KEY_8: ${{ secrets.KEY_8 }}
          KEY_9: ${{ secrets.KEY_9 }}
          KEY_10: ${{ secrets.KEY_10 }}

      - name: Upload block files to release (batches of 100)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          START="${{ steps.range.outputs.start }}"
          END="${{ steps.range.outputs.end }}"
          TAG="blocks-${START}-${END}"
          COUNT=$(find batch-blocks -maxdepth 1 -name '[0-9]*.txt' | wc -l)
          echo "Uploading ${COUNT} block files to release: ${TAG}"
          find batch-blocks -maxdepth 1 -name '[0-9]*.txt' -print0 \
            | xargs -0 -n 100 sh -c 'tag="$1"; shift; gh release upload "$tag" "$@" --clobber' "_" "${TAG}"
