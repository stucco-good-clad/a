name: Cloudflare WARP IP Reveal

on:
  push:
    branches: [main]

jobs:
  warp-reveal:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show IP before WARP
        run: |
          echo "=== IP BEFORE WARP ==="
          curl -s https://ifconfig.me || true
          echo ""
          curl -s https://ipinfo.io/json || true

      - name: Install Cloudflare WARP
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Register WARP
        run: |
          sudo warp-cli registration new --accept-tos

      - name: Connect WARP (proxy mode)
        run: |
          sudo warp-cli set-mode proxy
          sudo warp-cli connect
          sleep 8

      - name: Verify WARP status
        run: |
          sudo warp-cli status || true
          sudo warp-cli get-accept-dns || true
          sudo warp-cli mode || true

      - name: Show IP after WARP
        run: |
          echo "=== IP AFTER WARP ==="
          curl -s --proxy socks5://127.0.0.1:4000 https://ifconfig.me || true
          echo ""
          curl -s --proxy socks5://127.0.0.1:4000 https://ipinfo.io/json || true
