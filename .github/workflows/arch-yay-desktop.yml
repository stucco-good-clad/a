name: Arch Linux + Yay + GitHub Desktop

on:
  push:

jobs:
  arch-yay-desktop:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update system
        run: pacman -Syu --noconfirm

      - name: Install base packages
        run: pacman -S --noconfirm base-devel git sudo

      - name: Create non-root user
        run: |
          useradd -m -s /bin/bash builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder
          mkdir -p /home/builder/.cache/yay
          chown -R builder:builder /home/builder

      - name: Install yay and GitHub Desktop
        env:
          YAY_DIR: /home/builder/yay
        run: |
          su - builder -c "git clone https://aur.archlinux.org/yay.git $YAY_DIR"
          chown -R builder:builder "$YAY_DIR"
          su - builder -c "cd $YAY_DIR && makepkg -si --noconfirm"
          su - builder -c "yay -S --noconfirm github-desktop-bin"
