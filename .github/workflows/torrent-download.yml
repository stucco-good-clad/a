name: torrent-download

on:
  push:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 2160

    steps:
      - uses: actions/checkout@v6

      - name: Install aria2
        run: sudo apt-get update && sudo apt-get install -y aria2

      - name: Download torrent
        run: |
          mkdir -p download
          cd download
          aria2c \
            --seed-time=0 \
            --bt-stop-timeout=60 \
            --max-concurrent-downloads=16 \
            --split=16 \
            --min-split-size=1M \
            "magnet:?xt=urn:btih:777695049623a1cd052bd6b175b40e6540ce74ca&dn=archlinux-2026.06.01-x86_64.iso"

      - name: Show downloaded files
        run: |
          ls -lah download/
          du -sh download/*

      - name: Compress
        run: |
          zstd -3 -o archlinux-2026.06.01-x86_64.iso.zst download/archlinux-2026.06.01-x86_64.iso

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-iso
          path: archlinux-2026.06.01-x86_64.iso.zst
          retention-days: 1
