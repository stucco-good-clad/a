name: SLC RPC Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: bash bench.sh ./target/release/solana-backfill http://slc.rpc.orbitflare.com "$KEY_1"
        env:
          KEY_1: ${{ secrets.KEY_1 }}
