name: SLC RPC Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: ./target/release/solana-backfill --rpc "http://slc.rpc.orbitflare.com" --from-latest 1000 --batch-size 100 --max-concurrent 20 --output ./blocks
        env:
          KEY_1: ${{ secrets.KEY_1 }}
