name: Solana Backfill Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      # ── Warmup SLC (always runs) ─────────────────────────────────────────────
      - name: Warmup SLC
        run: |
          ./target/release/solana-backfill \
            --rpc "http://slc.rpc.orbitflare.com" --api-key "$KEY_1" \
            --from-latest 10 --batch-size 10 --max-concurrent 2 \
            --quiet --output ./warmup_slc
        env:
          KEY_1: ${{ secrets.KEY_1 }}

      # ── Warmup LA ─────────────────────────────────────────────────────────────
      - name: Warmup LA
        run: |
          ./target/release/solana-backfill \
            --rpc "http://la.rpc.orbitflare.com" --api-key "$KEY_1" \
            --from-latest 10 --batch-size 10 --max-concurrent 2 \
            --quiet --output ./warmup_la
        env:
          KEY_1: ${{ secrets.KEY_1 }}

      # ── Timing diagnostic ────────────────────────────────────────────────────
      - name: "Diagnostic: SLC timing breakdown"
        run: |
          ./target/release/solana-backfill \
            --rpc "http://slc.rpc.orbitflare.com" --api-key "$KEY_1" \
            --from-latest 100 --batch-size 10 --max-concurrent 20 \
            --timing --quiet --output ./diag_slc \
            2>&1 | tee diag_slc.txt
        env:
          KEY_1: ${{ secrets.KEY_1 }}

      # ── Single-endpoint grid ─────────────────────────────────────────────────
      - name: "SLC: batch=10 concurrency=20"
        run: |
          ./target/release/solana-backfill \
            --rpc "http://slc.rpc.orbitflare.com" --api-key "$KEY_1" \
            --from-latest 1000 --batch-size 10 --max-concurrent 20 \
            --quiet --output ./blocks_slc_b10c20 \
            2>&1 | tee result_slc_b10c20.txt
        env:
          KEY_1: ${{ secrets.KEY_1 }}

      - name: "SLC: batch=20 concurrency=20"
        run: |
          ./target/release/solana-backfill \
            --rpc "http://slc.rpc.orbitflare.com" --api-key "$KEY_1" \
            --from-latest 1000 --batch-size 20 --max-concurrent 20 \
            --quiet --output ./blocks_slc_b20c20 \
            2>&1 | tee result_slc_b20c20.txt
        env:
          KEY_1: ${{ secrets.KEY_1 }}

      - name: "SLC: batch=50 concurrency=10"
        run: |
          ./target/release/solana-backfill \
            --rpc "http://slc.rpc.orbitflare.com" --api-key "$KEY_1" \
            --from-latest 1000 --batch-size 50 --max-concurrent 10 \
            --quiet --output ./blocks_slc_b50c10 \
            2>&1 | tee result_slc_b50c10.txt
        env:
          KEY_1: ${{ secrets.KEY_1 }}

      # ── Dual-endpoint ────────────────────────────────────────────────────────
      - name: "SLC+LA: batch=10 concurrency=20"
        run: |
          ./target/release/solana-backfill \
            --rpc "http://slc.rpc.orbitflare.com" --api-key "$KEY_1" \
            --rpc "http://la.rpc.orbitflare.com"  --api-key "$KEY_1" \
            --from-latest 1000 --batch-size 10 --max-concurrent 20 \
            --quiet --output ./blocks_dual_b10c20 \
            2>&1 | tee result_dual_b10c20.txt
        env:
          KEY_1: ${{ secrets.KEY_1 }}

      - name: "SLC+LA: batch=20 concurrency=20"
        run: |
          ./target/release/solana-backfill \
            --rpc "http://slc.rpc.orbitflare.com" --api-key "$KEY_1" \
            --rpc "http://la.rpc.orbitflare.com"  --api-key "$KEY_1" \
            --from-latest 1000 --batch-size 20 --max-concurrent 20 \
            --quiet --output ./blocks_dual_b20c20 \
            2>&1 | tee result_dual_b20c20.txt
        env:
          KEY_1: ${{ secrets.KEY_1 }}

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Collate summary
        if: always()
        run: |
          {
            echo "====== TIMING DIAGNOSTIC ======"
            cat diag_slc.txt 2>/dev/null || echo "(skipped)"
            echo ""
            echo "====== RESULTS ======"
            for f in result_*.txt; do
              [ -f "$f" ] || continue
              echo "--- $f ---"
              grep -E "done|blk/s|MB/s|ok=|wire|theoretical" "$f" || true
              echo ""
            done
          } > summary.txt
          cat summary.txt

      # ── Upload block data ────────────────────────────────────────────────────
      - name: Upload block data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blocks-${{ github.run_id }}
          path: |
            blocks_slc_b10c20/
            blocks_slc_b20c20/
            blocks_slc_b50c10/
            blocks_dual_b10c20/
            blocks_dual_b20c20/
          retention-days: 90
          compression-level: 0   # files are already gzipped

      - name: Upload benchmark summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary-${{ github.run_id }}
          path: |
            summary.txt
            diag_slc.txt
            result_*.txt
          retention-days: 90
