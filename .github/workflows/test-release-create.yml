name: test-release-create

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download release.zip
        run: |
          curl -L -o release.zip \
            "https://github.com/devakapatel/files/releases/download/1/release.zip"
          ls -lh release.zip

      - name: Make 19 copies and zip (no compression)
        run: |
          mkdir -p copies
          cp release.zip copies/
          for i in $(seq 1 39); do
            cp release.zip copies/copy_${i}.zip
          done
          zip -0 -q -q release-40x.zip copies/*
          ls -lh release-40x.zip

      - uses: actions/upload-artifact@v4
        with:
          name: release-40x
          path: release-40x.zip
