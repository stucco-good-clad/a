name: test-release-create

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Download release.zip from devakapatel/files
        run: |
          echo "Fetching release.zip..."
          curl -L -o release.zip \
            "https://github.com/devakapatel/files/releases/download/1/release.zip"
          ls -lh release.zip

      - name: Store in Actions artifact storage
        uses: actions/upload-artifact@v4
        with:
          name: fetched-release
          path: release.zip
          retention-days: 90
