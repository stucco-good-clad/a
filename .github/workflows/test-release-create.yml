name: test-release-create

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download release.zip
        run: |
          curl -L -o release.zip \
            "https://github.com/devakapatel/files/releases/download/1/release.zip"
          ORIG=$(stat -c%s release.zip)
          echo "Original: $((ORIG / 1048576)) MB ($ORIG bytes)"

      - name: Probe size limit (create + delete releases)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          ORIG_SIZE=$(stat -c%s release.zip)
          MB=$((ORIG_SIZE / 1048576))
          echo "Original: ${MB} MB"

          for i in $(seq 0 15); do
            NUM_COPIES=$((2 ** i))
            echo ""
            echo "=== Iteration $i: ${NUM_COPIES} copies ==="

            dir="work/$i"
            mkdir -p "$dir"
            for c in $(seq 0 $((NUM_COPIES - 1))); do
              cp release.zip "$dir/copy_${c}"
            done

            zip_name="probe_${i}.zip"
            zip -0 -q -r "$zip_name" "$dir/"
            ZIP_SIZE=$(stat -c%s "$zip_name")
            ZIP_MB=$((ZIP_SIZE / 1048576))
            echo "  → ${ZIP_MB} MB"

            if [ "$ZIP_MB" -ge 51200 ]; then
              echo "  Skipping (>= 51 GB)"
              break
            fi

            echo "  Attempting upload..."
            if gh release create "probe-${ZIP_MB}MB-${NUM_COPIES}x" \
              --repo "$REPO" \
               --title "Probe ${ZIP_MB} MB (${NUM_COPIES} copies)" \
              --notes "Size limit probe" \
              "$zip_name"; then
              echo "  ✓ Uploaded (${ZIP_MB} MB)"
              gh release delete "probe-${ZIP_MB}MB-${NUM_COPIES}x" \
                --repo "$REPO" --yes || true
              echo "  Deleted after upload"
            else
              echo "  ✗ Upload FAILED at ${ZIP_MB} MB"
              echo ""
              echo "========== LIMIT FOUND =========="
              echo "Last successful: iteration $((i-1)) ($((ZIP_MB / 2)) MB)"
              echo "Failed at: ${ZIP_MB} MB (${NUM_COPIES} copies)"
              rm -rf work "$zip_name" release.zip
              exit 0
            fi

            rm -rf "$dir" "$zip_name"
          done

          echo ""
          echo "========== All sizes succeeded up to ${ZIP_MB} MB =========="
          rm -rf work release.zip
