name: test-release-create

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Creating single test release..."
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "test-single-release-$(date +%s)" \
            --repo "${{ github.repository }}" \
            --title "Test Single Release" \
            --notes "Testing if a single gh release create works"
