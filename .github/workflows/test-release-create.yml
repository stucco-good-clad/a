name: test-release-create

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download release.zip
        run: |
          curl -L -o release.zip \
            "https://github.com/devakapatel/files/releases/download/1/release.zip"
          ORIG=$(stat -c%s release.zip)
          echo "Original: $((ORIG / 1048576)) MB ($ORIG bytes)"

      - name: Probe artifact size limit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          ORIG_SIZE=$(stat -c%s release.zip)
          MB=$((ORIG_SIZE / 1048576))
          echo "REPO=$REPO RUN_ID=$RUN_ID Original=${MB}MB"

          for i in $(seq 0 15); do
            NUM_COPIES=$((2 ** i))
            echo ""
            echo "=== Iteration $i: ${NUM_COPIES} copies ==="

            dir="work/$i"
            mkdir -p "$dir"
            for c in $(seq 0 $((NUM_COPIES - 1))); do
              cp release.zip "$dir/copy_${c}"
            done

            zip_name="probe_${i}.zip"
            zip -0 -q -r "$zip_name" "$dir/"
            ZIP_SIZE=$(stat -c%s "$zip_name")
            ZIP_MB=$((ZIP_SIZE / 1048576))
            echo "  → ${ZIP_MB} MB"

            if [ "$ZIP_MB" -ge 51200 ]; then
              echo "  Skipping (>= 51 GB)"
              break
            fi

            echo "  Creating artifact resource..."
            CREATE_RESP=$(gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
              -f "name=probe-${ZIP_MB}MB" \
              -f "archive_format=zip" 2>&1) || {
                echo "  ✗ CREATE FAILED at ${ZIP_MB} MB"
                echo "  Error: $CREATE_RESP"
                echo ""
                echo "========== LIMIT FOUND =========="
                echo "Last successful: iteration $((i-1)) ($((ZIP_MB / 2)) MB)"
                echo "Failed at: ${ZIP_MB} MB (${NUM_COPIES} copies)"
                rm -rf work "$zip_name" release.zip
                exit 0
              }

            ARTIFACT_ID=$(echo "$CREATE_RESP" | jq -r '.id')
            UPLOAD_URL=$(echo "$CREATE_RESP" | jq -r '.upload_url // empty')

            if [ -n "$UPLOAD_URL" ] && [ "$UPLOAD_URL" != "null" ]; then
              echo "  Uploading zip..."
              curl -s -X PUT \
                -H "Content-Type: application/zip" \
                -H "Authorization: Bearer $GH_TOKEN" \
                --data-binary @"$zip_name" \
                "$UPLOAD_URL" > /dev/null
              echo "  ✓ Uploaded (id: $ARTIFACT_ID, ${ZIP_MB} MB)"
            fi

            # Delete artifact via API
            gh api --method DELETE \
              "/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}" > /dev/null 2>&1 || true
            echo "  Deleted artifact $ARTIFACT_ID"

            rm -rf "$dir" "$zip_name"
          done

          echo ""
          echo "========== All sizes succeeded up to ${ZIP_MB} MB =========="
          rm -rf work release.zip
