name: getBlock

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  RPC_URL: http://slc.rpc.orbitflare.com

permissions:
  contents: write

jobs:
  getblock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Fetch block
        working-directory: getblock
        run: cargo run --release
        env:
          API_KEY: ${{ secrets.KEY_1 }}

      - name: Read slot and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SLOT=$(cat getblock/slot.txt)
          echo "Release for block ${SLOT}"
          gh release create "block-${SLOT}" \
            --title "Block ${SLOT}" \
            --notes "Full block data for slot ${SLOT}" \
            "getblock/${SLOT}.txt"
