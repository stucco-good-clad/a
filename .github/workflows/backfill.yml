name: backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Select best Orbitflare endpoint
        id: select-rpc
        env:
          KEY_1: ${{ secrets.KEY_1 }}
        run: bash scripts/select-rpc.sh

      - name: Detect OnFinality keys
        id: detect-of
        env:
          ON1: ${{ secrets.on1 }}
          ON2: ${{ secrets.on2 }}
          ON3: ${{ secrets.on3 }}
          ON4: ${{ secrets.on4 }}
        run: |
          set +e
          KEYS=""
          URLS=""
          for N in 1 2 3 4; do
            VAR="ON${N}"
            VAL="${!VAR}"
            if [ -n "$VAL" ]; then
              if [ -n "$KEYS" ]; then KEYS="${KEYS},"; URLS="${URLS},"; fi
              KEYS="${KEYS}${VAL}"
              URLS="${URLS}https://solana.api.onfinality.io/rpc"
              echo "  on${N}: ${VAL:0:8}..."
            fi
          done
          N=$(echo "$KEYS" | tr ',' '\n' | wc -l)
          if [ "$N" -eq 0 ] || [ -z "$KEYS" ]; then
            N=0
            echo "  none found"
          fi
          echo ""
          echo "  total: ${N} OnFinality keys"
          echo "n=${N}" >> "$GITHUB_OUTPUT"
          echo "urls=${URLS}" >> "$GITHUB_OUTPUT"
          echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"

      - name: Determine window
        id: window
        env:
          GH_TOKEN: ${{ github.token }}
          GIST_ID: ${{ secrets.GIST_ID }}
          KEY_1: ${{ secrets.KEY_1 }}
          RPC_URL: ${{ steps.select-rpc.outputs.rpc_url }}
        run: bash scripts/determine-window.sh

      - name: Fetch valid blocks in window
        id: fetch
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          RPC_URL: ${{ steps.select-rpc.outputs.rpc_url }}
          START: ${{ steps.window.outputs.start }}
          END: ${{ steps.window.outputs.end }}
        run: bash scripts/fetch-slots.sh

      - name: Build binaries
        run: |
          set -euo pipefail
          cargo build --release --bin batch-blocks --bin sol-swap-parser --bin binance-downloader --bin enrich-with-cex

      - name: Fetch raw blocks
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          RPC_URL: ${{ steps.select-rpc.outputs.rpc_url }}
          RPC_URLS: ${{ steps.detect-of.outputs.urls }}
          ONFINALITY_KEYS: ${{ steps.detect-of.outputs.keys }}
          API_KEY_PARAM: "apikey"
        run: |
          set -euo pipefail
          rm -rf raw
          mkdir -p raw

          N=${{ steps.detect-of.outputs.n }}
          if [ "$N" -gt 0 ]; then
            echo "Using ${N} OnFinality keys (parallel)"
            IFS=',' read -ra OF_KEYS <<< "$ONFINALITY_KEYS"
            for i in "${!OF_KEYS[@]}"; do
              export "KEY_$((i+1))=${OF_KEYS[$i]}"
            done
            ./target/release/batch-blocks --slots-file slots.txt
          else
            echo "No OnFinality keys — using Orbitflare"
            ./target/release/batch-blocks --slots-file slots.txt
          fi

      - name: Extract SOL/USD OHLCV
        run: |
          set -euo pipefail
          ./target/release/sol-swap-parser --raw-dir raw --output sol_usd_ohlcv.csv --enriched-dir enriched

      - name: Download Binance 1s klines
        env:
          SYMBOLS: SOLUSDT,BTCUSDT,ETHUSDT,SOLETH,SOLUSDC,ETHBTC,BNBUSDT,XRPUSDT,DOGEUSDT
          BINANCE_DOWNLOADER: ${{ github.workspace }}/target/release/binance-downloader
        run: bash scripts/download-klines.sh

      - name: Enrich blocks with CEX data
        run: |
          set -euo pipefail
          if [ -d cex ] && [ "$(ls cex/*.csv 2>/dev/null | wc -l)" -gt 0 ]; then
            ./target/release/enrich-with-cex \
              --blocks-dir enriched \
              --cex-dir cex \
              --symbols SOLUSDT,BTCUSDT,ETHUSDT,SOLETH,SOLUSDC,ETHBTC,BNBUSDT,XRPUSDT,DOGEUSDT \
              --output-dir cex_enriched
          else
            echo "No CEX data available — copying enriched blocks as-is"
            mkdir -p cex_enriched
            cp enriched/*.txt cex_enriched/
          fi

      - name: Upload OHLCV
        uses: actions/upload-artifact@v7
        with:
          name: sol-usd-ohlcv-${{ steps.window.outputs.start }}-${{ steps.window.outputs.end }}
          path: sol_usd_ohlcv.csv
          retention-days: 30

      - name: Archive to Release
        env:
          GH_TOKEN: ${{ github.token }}
          START: ${{ steps.window.outputs.start }}
          END: ${{ steps.window.outputs.end }}
        run: bash scripts/archive-release.sh

      - name: Update state
        env:
          GH_TOKEN: ${{ github.token }}
          GIST_ID: ${{ secrets.GIST_ID }}
          END: ${{ steps.window.outputs.end }}
          COUNT: ${{ steps.fetch.outputs.count }}
        run: bash scripts/update-state.sh
