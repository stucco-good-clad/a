name: backfill

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: batch-blocks

      - name: Determine window
        id: window
        env:
          RPC_URL: http://slc.rpc.orbitflare.com
        run: |
          set -euo pipefail
          RESP=$(curl -s -X POST "$RPC_URL?api_key=${{ secrets.KEY_1 }}" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}')
          CURRENT=$(echo "$RESP" | jq -r '.result')
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "null" ]; then
            echo "Failed to get current slot response: $RESP"
            exit 1
          fi
          START=$((CURRENT - 1000))
          END=$CURRENT
          echo "Using window $START to $END"
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END" >> "$GITHUB_OUTPUT"

      - name: Fetch valid blocks in window
        id: fetch
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          RPC_URL: http://slc.rpc.orbitflare.com
        run: |
          set -euo pipefail
          START=${{ steps.window.outputs.start }}
          END=${{ steps.window.outputs.end }}

          RESP=$(curl -s -X POST "$RPC_URL?api_key=$KEY_1" \
            -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlocks\",\"params\":[$START,$END]}")
          echo "$RESP" | jq -r '.result[]' > batch-blocks/slots.txt
          COUNT=$(wc -l < batch-blocks/slots.txt)
          echo "Valid blocks: $COUNT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Get full block data
        working-directory: batch-blocks
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          KEY_2: ${{ secrets.KEY_2 }}
          KEY_3: ${{ secrets.KEY_3 }}
          KEY_4: ${{ secrets.KEY_4 }}
          KEY_5: ${{ secrets.KEY_5 }}
          KEY_6: ${{ secrets.KEY_6 }}
          KEY_7: ${{ secrets.KEY_7 }}
          KEY_8: ${{ secrets.KEY_8 }}
          KEY_9: ${{ secrets.KEY_9 }}
          KEY_10: ${{ secrets.KEY_10 }}
          RPC_URL: http://slc.rpc.orbitflare.com
        run: |
          set -euo pipefail
          cargo build --release
          ./target/release/batch-blocks --slots-file slots.txt

      - name: Update state
        run: |
          set -euo pipefail
          START=${{ steps.window.outputs.start }}
          END=${{ steps.window.outputs.end }}
          COUNT=${{ steps.fetch.outputs.count }}

          cat > state.json <<EOF
          {
            "last_end_slot": $START,
            "trained_through": $END,
            "block_count": $COUNT,
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "State updated:"
          cat state.json

      - name: Commit state
        run: |
          git config --global user.name "backfill-bot"
          git config --global user.email "actions@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add state.json
          git commit -m "backfill: advance to ${{ steps.window.outputs.start }}"
          git push
