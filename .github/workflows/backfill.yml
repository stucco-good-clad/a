name: backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Select best RPC endpoint
        id: select-rpc
        env:
          KEY_1: ${{ secrets.KEY_1 }}
        run: |
          set -euo pipefail
          REGIONS=(ams fra lon ny slc la va jp sg)
          BEST_REGION=""
          BEST_TIME=""
          for r in "${REGIONS[@]}"; do
            URL="http://${r}.rpc.orbitflare.com"
            TOTAL=$(curl -o /dev/null -s -w "%{time_total}" -X POST "$URL" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}' || echo "999")
            echo "${r}: ${TOTAL}s"
            if [ -z "$BEST_REGION" ] || [ "$(printf '%s\n' "$TOTAL" "$BEST_TIME" | sort -V | head -n1)" = "$TOTAL" ]; then
              BEST_REGION="$r"
              BEST_TIME="$TOTAL"
            fi
          done
          echo "Selected: ${BEST_REGION} (${BEST_TIME}s)"
          echo "rpc_url=http://${BEST_REGION}.rpc.orbitflare.com" >> "$GITHUB_OUTPUT"

      - name: Determine window
        id: window
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          RPC_URL: ${{ steps.select-rpc.outputs.rpc_url }}
        run: |
          set -euo pipefail
          mkdir -p backfill

          if [ -f state.json ]; then
            LAST=$(jq -r '.last_end_slot' state.json)
            END=$LAST
            START=$((LAST - 1000))
            echo "Resuming from state: window $START to $END"
          else
            RESP=$(curl -s -X POST "$RPC_URL?api_key=$KEY_1" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}')
            CURRENT=$(echo "$RESP" | jq -r '.result')
            END=$CURRENT
            START=$((CURRENT - 1000))
            echo "Fresh start at slot $CURRENT: window $START to $END"
          fi

          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END" >> "$GITHUB_OUTPUT"

      - name: Fetch valid blocks in window
        id: fetch
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          RPC_URL: ${{ steps.select-rpc.outputs.rpc_url }}
        run: |
          set -euo pipefail
          START=${{ steps.window.outputs.start }}
          END=${{ steps.window.outputs.end }}

          RESP=$(curl -s -X POST "$RPC_URL?api_key=$KEY_1" \
            -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlocks\",\"params\":[$START,$END]}")
          echo "$RESP" | jq -r '.result[]' > slots.txt
          COUNT=$(wc -l < slots.txt)
          echo "Valid blocks: $COUNT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Get full block data
        working-directory: batch-blocks
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          KEY_2: ${{ secrets.KEY_2 }}
          KEY_3: ${{ secrets.KEY_3 }}
          KEY_4: ${{ secrets.KEY_4 }}
          KEY_5: ${{ secrets.KEY_5 }}
          KEY_6: ${{ secrets.KEY_6 }}
          KEY_7: ${{ secrets.KEY_7 }}
          KEY_8: ${{ secrets.KEY_8 }}
          KEY_9: ${{ secrets.KEY_9 }}
          KEY_10: ${{ secrets.KEY_10 }}
          RPC_URL: ${{ steps.select-rpc.outputs.rpc_url }}
        run: |
          set -euo pipefail
          mkdir -p raw
          cargo build --release
          ./target/release/batch-blocks --slots-file slots.txt

      - name: Build OHLCV
        working-directory: batch-blocks
        run: |
          set -euo pipefail
          cargo run --bin ohlcv -- raw ohlcv.csv

      - name: Upload OHLCV
        uses: actions/upload-artifact@v7
        with:
          name: ohlcv-${{ steps.window.outputs.start }}-${{ steps.window.outputs.end }}
          path: ohlcv.csv
          retention-days: 30

      - name: Update state
        run: |
          set -euo pipefail
          START=${{ steps.window.outputs.start }}
          END=${{ steps.window.outputs.end }}
          COUNT=${{ steps.fetch.outputs.count }}

          cat > state.json <<EOF
          {
            "last_end_slot": $START,
            "trained_through": $END,
            "block_count": $COUNT,
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "State updated:"
          cat state.json

      - name: Commit state
        run: |
          git config --global user.name "backfill-bot"
          git config --global user.email "actions@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add state.json
          git commit -m "backfill: advance to ${{ steps.window.outputs.start }}"
          git push
