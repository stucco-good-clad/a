name: ci

on:
  push:

jobs:
  bench:
    runs-on: ubuntu-latest
    env:
      HELIUS_KEY: ${{ secrets.HELIUS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: cargo build --release

      - name: Benchmark batch sizes x concurrencies
        run: cargo run --release
