name: Rust CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dtolnay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo run --release
        env:
          key_1: ${{ secrets.KEY_1 }}

  actions-rust-lang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - run: cargo run --release
        env:
          key_1: ${{ secrets.KEY_1 }}
