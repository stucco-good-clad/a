name: Rust CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cargo run --release
        env:
          key_1: ${{ secrets.KEY_1 }}

      - name: Upload blocks to per-worker releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          for dir in blocks_output/worker_*/; do
            [ -d "$dir" ] || continue
            worker=$(basename "$dir")

            files=("$dir"*.json)
            count=${#files[@]}
            [ "$count" -eq 0 ] && continue

            tag="${worker}-run-${{ github.run_id }}"
            echo "::group::Creating release $tag ($count files from $worker)"
            gh release create "$tag" \
              "$dir"*.json \
              --repo "$GITHUB_REPOSITORY" \
              --title "Blocks $worker (run ${{ github.run_id }})" \
              --notes "$count raw block files from worker $worker"
            echo "::endgroup::"
          done
