name: Rust CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo run --release
        env:
          key_1: ${{ secrets.KEY_1 }}

      - uses: actions/upload-artifact@v4
        with:
          name: blocks
          path: blocks.txt

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: blocks-${{ github.run_number }}
          name: Blocks ${{ github.run_number }}
          body: "${{ github.run_number }} block dump from commit ${{ github.sha }}"
          files: blocks.txt
