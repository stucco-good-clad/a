name: onfinality-test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ping test
        env:
          ON1: ${{ secrets.on1 }}
          ON2: ${{ secrets.on2 }}
        run: |
          set +e
          echo "==========================================="
          echo "  OnFinality Key Ping Test (getSlot)"
          echo "==========================================="
          echo ""

          BODY='{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}'

          for LABEL in on1 on2; do
            if [ "$LABEL" = "on1" ]; then KEY="$ON1"; else KEY="$ON2"; fi
            URL="https://solana.api.onfinality.io/rpc?apikey=${KEY}"
            PREFIX="${KEY:0:8}"
            TOTAL=0

            echo "--- ${LABEL} (${PREFIX}...) ---"
            for i in 1 2 3 4 5; do
              RESP=$(curl -s -w "\n%{time_total}" --max-time 10 -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d "$BODY")
              BODY_R=$(echo "$RESP" | head -n -1)
              TIME=$(echo "$RESP" | tail -n 1)
              MS=$(echo "$TIME" | awk '{printf "%.0f", $1 * 1000}')
              SLOT=$(echo "$BODY_R" | jq -r '.result // "error"' 2>/dev/null || echo "error")
              echo "  ping $i: ${MS}ms (slot ${SLOT})"
              TOTAL=$((TOTAL + MS))
            done
            AVG=$((TOTAL / 5))
            echo "  average: ${AVG}ms"
            echo ""
          done

      - name: Single key rate limit (getBlock)
        env:
          ON1: ${{ secrets.on1 }}
        run: |
          set +e
          echo "==========================================="
          echo "  Single Key Rate Limit — getBlock (on1)"
          echo "==========================================="
          echo ""

          SLOT=423000000
          BODY="{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"jsonParsed\",\"transactionDetails\":\"none\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}"
          URL="https://solana.api.onfinality.io/rpc?apikey=${ON1}"
          MAX_OK=0

          for RPS in 5 10 15 20 25 30 40 50 60 80 100; do
            TMPDIR=$(mktemp -d)
            START_MS=$(date +%s%3N)
            for i in $(seq 1 "$RPS"); do
              curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d "$BODY" > "$TMPDIR/$i" &
            done
            wait
            END_MS=$(date +%s%3N)
            ELAPSED=$((END_MS - START_MS))
            OK=$(grep -l "200" "$TMPDIR"/* 2>/dev/null | wc -l)
            FAIL=$((RPS - OK))
            rm -rf "$TMPDIR"

            if [ "$FAIL" -eq 0 ]; then
              echo "  ${RPS} RPS: ${OK}/${RPS} ok (${ELAPSED}ms wall)"
              MAX_OK=$RPS
            else
              echo "  ${RPS} RPS: ${OK}/${RPS} ok, ${FAIL} fail -- BREAKS"
              break
            fi
          done
          echo "  single key ceiling: ~${MAX_OK} RPS"
          echo ""

      - name: Single key sustained load (getBlock)
        env:
          ON1: ${{ secrets.on1 }}
        run: |
          set +e
          echo "==========================================="
          echo "  Single Key Sustained Load — 30s at 10 RPS"
          echo "==========================================="
          echo ""

          SLOT=423000000
          BODY="{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"jsonParsed\",\"transactionDetails\":\"none\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}"
          URL="https://solana.api.onfinality.io/rpc?apikey=${ON1}"
          DURATION=30
          TARGET_RPS=10
          TOTAL=0
          OK=0

          START=$(date +%s)
          while true; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            if [ "$ELAPSED" -ge "$DURATION" ]; then break; fi

            TMPDIR=$(mktemp -d)
            for i in $(seq 1 "$TARGET_RPS"); do
              RESP=$(curl -s -w "\n%{http_code}" --max-time 10 \
                -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d "$BODY")
              CODE=$(echo "$RESP" | tail -n 1)
              TOTAL=$((TOTAL + 1))
              if [ "$CODE" = "200" ]; then
                OK=$((OK + 1))
              fi
            done
            rm -rf "$TMPDIR"
            sleep 1
          done

          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(echo "scale=1; $OK * 100 / $TOTAL" | bc)
            echo "  ${OK}/${TOTAL} ok (${RATE}% success) over ${DURATION}s"
          else
            echo "  no requests made"
          fi
          echo ""

      - name: Both keys parallel rate limit (getBlock)
        env:
          ON1: ${{ secrets.on1 }}
          ON2: ${{ secrets.on2 }}
        run: |
          set +e
          echo "==========================================="
          echo "  Both Keys Parallel Rate Limit — getBlock"
          echo "==========================================="
          echo ""

          SLOT=423000000
          BODY="{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"jsonParsed\",\"transactionDetails\":\"none\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}"
          URL1="https://solana.api.onfinality.io/rpc?apikey=${ON1}"
          URL2="https://solana.api.onfinality.io/rpc?apikey=${ON2}"
          MAX_OK=0

          for RPS in 10 20 30 40 50 60 80 100 120 150; do
            HALF=$((RPS / 2))
            REMAINING=$((RPS - HALF))
            TMPDIR=$(mktemp -d)
            START_MS=$(date +%s%3N)

            for i in $(seq 1 "$HALF"); do
              curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                -X POST "$URL1" \
                -H "Content-Type: application/json" \
                -d "$BODY" > "$TMPDIR/o1_$i" &
            done
            for i in $(seq 1 "$REMAINING"); do
              curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                -X POST "$URL2" \
                -H "Content-Type: application/json" \
                -d "$BODY" > "$TMPDIR/o2_$i" &
            done
            wait
            END_MS=$(date +%s%3N)
            ELAPSED=$((END_MS - START_MS))

            OK=$(grep -l "200" "$TMPDIR"/* 2>/dev/null | wc -l)
            FAIL=$((RPS - OK))
            rm -rf "$TMPDIR"

            if [ "$FAIL" -eq 0 ]; then
              echo "  ${RPS} RPS (${HALF}+${REMAINING}): ${OK}/${RPS} ok (${ELAPSED}ms wall)"
              MAX_OK=$RPS
            else
              echo "  ${RPS} RPS (${HALF}+${REMAINING}): ${OK}/${RPS} ok, ${FAIL} fail -- BREAKS"
              break
            fi
          done
          echo "  combined ceiling: ~${MAX_OK} RPS"
          echo ""

      - name: Summary
        run: |
          echo "==========================================="
          echo "  Done"
          echo "==========================================="
