name: onfinality-test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ping test
        env:
          ON1: ${{ secrets.on1 }}
          ON2: ${{ secrets.on2 }}
          ON3: ${{ secrets.on3 }}
          ON4: ${{ secrets.on4 }}
        run: |
          set +e
          echo "==========================================="
          echo "  OnFinality Ping Test (getSlot)"
          echo "==========================================="
          echo ""

          BODY='{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}'

          for LABEL in on1 on2 on3 on4; do
            eval "KEY=\$$LABEL"
            if [ -z "$KEY" ]; then echo "  ${LABEL}: NOT SET — skipping"; continue; fi
            URL="https://solana.api.onfinality.io/rpc?apikey=${KEY}"
            PREFIX="${KEY:0:8}"
            TOTAL=0

            echo "--- ${LABEL} (${PREFIX}...) ---"
            for i in 1 2 3 4 5; do
              RESP=$(curl -s -w "\n%{time_total}" --max-time 10 -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d "$BODY")
              BODY_R=$(echo "$RESP" | head -n -1)
              TIME=$(echo "$RESP" | tail -n 1)
              MS=$(echo "$TIME" | awk '{printf "%.0f", $1 * 1000}')
              SLOT=$(echo "$BODY_R" | jq -r '.result // "error"' 2>/dev/null || echo "error")
              echo "  ping $i: ${MS}ms (slot ${SLOT})"
              TOTAL=$((TOTAL + MS))
            done
            AVG=$((TOTAL / 5))
            echo "  average: ${AVG}ms"
            echo ""
          done

      - name: Single key rate limit (getBlock)
        env:
          ON1: ${{ secrets.on1 }}
        run: |
          set +e
          echo "==========================================="
          echo "  Single Key Rate Limit — getBlock (on1)"
          echo "==========================================="
          echo ""

          SLOT=423000000
          BODY="{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"jsonParsed\",\"transactionDetails\":\"none\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}"
          URL="https://solana.api.onfinality.io/rpc?apikey=${ON1}"
          MAX_OK=0

          for RPS in 5 10 15 20 25 30 40 50; do
            TMPDIR=$(mktemp -d)
            START_MS=$(date +%s%3N)
            for i in $(seq 1 "$RPS"); do
              curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d "$BODY" > "$TMPDIR/$i" &
            done
            wait
            END_MS=$(date +%s%3N)
            ELAPSED=$((END_MS - START_MS))
            OK=$(grep -l "200" "$TMPDIR"/* 2>/dev/null | wc -l)
            FAIL=$((RPS - OK))
            rm -rf "$TMPDIR"

            if [ "$FAIL" -eq 0 ]; then
              echo "  ${RPS} RPS: ${OK}/${RPS} ok (${ELAPSED}ms wall)"
              MAX_OK=$RPS
            else
              echo "  ${RPS} RPS: ${OK}/${RPS} ok, ${FAIL} fail -- BREAKS"
              break
            fi
          done
          echo "  single key ceiling: ~${MAX_OK} RPS"
          echo ""

      - name: 4 keys parallel rate limit (getBlock)
        env:
          ON1: ${{ secrets.on1 }}
          ON2: ${{ secrets.on2 }}
          ON3: ${{ secrets.on3 }}
          ON4: ${{ secrets.on4 }}
        run: |
          set +e
          echo "==========================================="
          echo "  4 Keys Parallel Rate Limit — getBlock"
          echo "==========================================="
          echo ""

          SLOT=423000000
          BODY="{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"jsonParsed\",\"transactionDetails\":\"none\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}"

          URLS=()
          LABELS=()
          for LABEL in on1 on2 on3 on4; do
            eval "KEY=\$$LABEL"
            if [ -n "$KEY" ]; then
              URLS+=("https://solana.api.onfinality.io/rpc?apikey=${KEY}")
              LABELS+=("$LABEL")
            fi
          done
          N=${#URLS[@]}
          echo "  keys available: ${N} (${LABELS[*]})"
          echo ""

          MAX_OK=0

          for RPS in 10 20 30 40 50 60 80 100 120 150; do
            PER_KEY=$((RPS / N))
            REMAINING=$((RPS - PER_KEY * N))
            TMPDIR=$(mktemp -d)
            START_MS=$(date +%s%3N)
            IDX=0

            for k in $(seq 0 $((N - 1))); do
              COUNT=$PER_KEY
              if [ "$k" -eq 0 ]; then
                COUNT=$((COUNT + REMAINING))
              fi
              for i in $(seq 1 "$COUNT"); do
                curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                  -X POST "${URLS[$k]}" \
                  -H "Content-Type: application/json" \
                  -d "$BODY" > "$TMPDIR/${LABELS[$k]}_${i}" &
                IDX=$((IDX + 1))
              done
            done
            wait
            END_MS=$(date +%s%3N)
            ELAPSED=$((END_MS - START_MS))

            OK=$(grep -l "200" "$TMPDIR"/* 2>/dev/null | wc -l)
            FAIL=$((RPS - OK))
            rm -rf "$TMPDIR"

            if [ "$FAIL" -eq 0 ]; then
              echo "  ${RPS} RPS (${PER_KEY}/key + ${REMAINING} extra): ${OK}/${RPS} ok (${ELAPSED}ms wall)"
              MAX_OK=$RPS
            else
              echo "  ${RPS} RPS (${PER_KEY}/key + ${REMAINING} extra): ${OK}/${RPS} ok, ${FAIL} fail -- BREAKS"
              break
            fi
          done
          echo "  4-key ceiling: ~${MAX_OK} RPS"
          echo ""

      - name: Summary
        run: |
          echo "==========================================="
          echo "  Done"
          echo "==========================================="
