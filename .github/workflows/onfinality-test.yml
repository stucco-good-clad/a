name: onfinality-test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect available keys
        id: detect
        env:
          ON1: ${{ secrets.on1 }}
          ON2: ${{ secrets.on2 }}
          ON3: ${{ secrets.on3 }}
          ON4: ${{ secrets.on4 }}
          ON5: ${{ secrets.on5 }}
          ON6: ${{ secrets.on6 }}
          ON7: ${{ secrets.on7 }}
          ON8: ${{ secrets.on8 }}
          ON9: ${{ secrets.on9 }}
          ON10: ${{ secrets.on10 }}
          ON11: ${{ secrets.on11 }}
          ON12: ${{ secrets.on12 }}
          ON13: ${{ secrets.on13 }}
          ON14: ${{ secrets.on14 }}
          ON15: ${{ secrets.on15 }}
          ON16: ${{ secrets.on16 }}
          ON17: ${{ secrets.on17 }}
          ON18: ${{ secrets.on18 }}
          ON19: ${{ secrets.on19 }}
          ON20: ${{ secrets.on20 }}
          ON21: ${{ secrets.on21 }}
          ON22: ${{ secrets.on22 }}
          ON23: ${{ secrets.on23 }}
          ON24: ${{ secrets.on24 }}
          ON25: ${{ secrets.on25 }}
          ON26: ${{ secrets.on26 }}
          ON27: ${{ secrets.on27 }}
          ON28: ${{ secrets.on28 }}
          ON29: ${{ secrets.on29 }}
          ON30: ${{ secrets.on30 }}
          ON31: ${{ secrets.on31 }}
          ON32: ${{ secrets.on32 }}
          ON33: ${{ secrets.on33 }}
          ON34: ${{ secrets.on34 }}
          ON35: ${{ secrets.on35 }}
          ON36: ${{ secrets.on36 }}
          ON37: ${{ secrets.on37 }}
          ON38: ${{ secrets.on38 }}
          ON39: ${{ secrets.on39 }}
          ON40: ${{ secrets.on40 }}
          ON41: ${{ secrets.on41 }}
          ON42: ${{ secrets.on42 }}
          ON43: ${{ secrets.on43 }}
          ON44: ${{ secrets.on44 }}
          ON45: ${{ secrets.on45 }}
          ON46: ${{ secrets.on46 }}
          ON47: ${{ secrets.on47 }}
          ON48: ${{ secrets.on48 }}
          ON49: ${{ secrets.on49 }}
          ON50: ${{ secrets.on50 }}
        run: |
          set +e
          API_KEYS=()

          for N in $(seq 1 50); do
            VAR="ON${N}"
            VAL="${!VAR}"
            if [ -z "$VAL" ]; then
              echo "  stopped at on${N} (not set)"
              break
            fi
            API_KEYS+=("$VAL")
            echo "  on${N}: ${VAL:0:8}..."
          done

          N=${#API_KEYS[@]}
          echo ""
          echo "  total: ${N} keys"
          echo ""

          echo "n=${N}" >> "$GITHUB_OUTPUT"
          # Write keys as newline-separated for reliable passing
          printf '%s\n' "${API_KEYS[@]}" > /tmp/keys.txt

      - name: Ping test
        run: |
          set +e
          echo "==========================================="
          echo "  OnFinality Ping Test (getSlot)"
          echo "==========================================="
          echo ""

          BODY='{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}'
          I=0

          while IFS= read -r KEY; do
            [ -z "$KEY" ] && continue
            I=$((I + 1))
            URL="https://solana.api.onfinality.io/rpc?apikey=${KEY}"
            PREFIX="${KEY:0:8}"
            TOTAL=0

            echo "--- key ${I} (${PREFIX}...) ---"
            for j in 1 2 3 4 5; do
              RESP=$(curl -s -w "\n%{time_total}" --max-time 10 -X POST "$URL" \
                -H "Content-Type: application/json" \
                -d "$BODY")
              BODY_R=$(echo "$RESP" | head -n -1)
              TIME=$(echo "$RESP" | tail -n 1)
              MS=$(echo "$TIME" | awk '{printf "%.0f", $1 * 1000}')
              SLOT=$(echo "$BODY_R" | jq -r '.result // "error"' 2>/dev/null || echo "error")
              echo "  ping $j: ${MS}ms (slot ${SLOT})"
              TOTAL=$((TOTAL + MS))
            done
            AVG=$((TOTAL / 5))
            echo "  average: ${AVG}ms"
            echo ""
          done < /tmp/keys.txt

      - name: All keys parallel rate limit (getBlock)
        run: |
          set +e
          echo "==========================================="
          echo "  All Keys Parallel Rate Limit — getBlock"
          echo "==========================================="
          echo ""
          echo "  (all keys fresh — no prior load)"
          echo ""

          N=${{ steps.detect.outputs.n }}
          SLOT=423000000
          BODY="{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getBlock\",\"params\":[${SLOT},{\"encoding\":\"jsonParsed\",\"transactionDetails\":\"none\",\"rewards\":false,\"maxSupportedTransactionVersion\":0}]}"

          URLS=()
          while IFS= read -r KEY; do
            [ -z "$KEY" ] && continue
            URLS+=("https://solana.api.onfinality.io/rpc?apikey=${KEY}")
          done < /tmp/keys.txt
          N=${#URLS[@]}
          echo "  active keys: ${N}"
          echo ""

          MAX_OK=0

          for RPS in 10 20 30 40 50 60 80 100 120 150 200 300 400 500; do
            PER_KEY=$((RPS / N))
            REMAINING=$((RPS - PER_KEY * N))
            TMPDIR=$(mktemp -d)
            START_MS=$(date +%s%3N)

            for k in $(seq 0 $((N - 1))); do
              COUNT=$PER_KEY
              if [ "$k" -eq 0 ]; then
                COUNT=$((COUNT + REMAINING))
              fi
              for i in $(seq 1 "$COUNT"); do
                curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
                  -X POST "${URLS[$k]}" \
                  -H "Content-Type: application/json" \
                  -d "$BODY" > "$TMPDIR/k${k}_${i}" &
              done
            done
            wait
            END_MS=$(date +%s%3N)
            ELAPSED=$((END_MS - START_MS))

            OK=$(grep -l "200" "$TMPDIR"/* 2>/dev/null | wc -l)
            FAIL=$((RPS - OK))
            rm -rf "$TMPDIR"

            if [ "$FAIL" -eq 0 ]; then
              echo "  ${RPS} RPS (${PER_KEY}/key + ${REMAINING} extra): ${OK}/${RPS} ok (${ELAPSED}ms wall)"
              MAX_OK=$RPS
            else
              echo "  ${RPS} RPS (${PER_KEY}/key + ${REMAINING} extra): ${OK}/${RPS} ok, ${FAIL} fail -- BREAKS"
              break
            fi
            sleep 2
          done
          echo ""
          echo "  ${N}-key ceiling: ~${MAX_OK} RPS"
          if [ "$N" -gt 0 ]; then
            echo "  effective per-key: ~$((MAX_OK / N)) RPS"
          fi
          echo ""

      - name: Summary
        run: |
          N=${{ steps.detect.outputs.n }}
          echo "==========================================="
          echo "  ${N} keys detected"
          RU=$((N * 400000))
          echo "  RU/day: ${RU}"
          echo "  RU for 1M blocks: 2000000"
          if [ "$RU" -ge 2000000 ]; then
            echo "  1M blocks fits in daily quota: YES"
          else
            echo "  1M blocks fits in daily quota: NO (need $((2000000 - RU)) more RU)"
          fi
          echo "==========================================="
