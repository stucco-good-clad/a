name: benchmark

on:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ping test
        id: ping
        env:
          KEY_1: ${{ secrets.KEY_1 }}
        run: bash scripts/select-rpc.sh

      - name: Get slot range
        id: range
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          RPC_URL: ${{ steps.ping.outputs.rpc_url }}
        run: |
          CURRENT=$(curl -s -X POST "$RPC_URL?api_key=$KEY_1" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"getSlot","params":[]}' \
            | jq -r '.result')
          START=$((CURRENT - 2000))
          END=$((CURRENT - 1001))
          seq $START $END > slots.txt
          echo "Range: $START to $END (1000 blocks)"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bin batch-blocks

      - name: Run benchmarks
        env:
          KEY_1: ${{ secrets.KEY_1 }}
          RPC_URL: ${{ steps.ping.outputs.rpc_url }}
        run: |
          echo ""
          echo "============================================="
          echo "  Benchmark: server=${{ steps.ping.outputs.rpc_url }}"
          echo "============================================="
          echo ""

          RESULTS_FILE=$(mktemp)
          echo "bs,c,bps,blocks_ok,batches_ok,batches_err" > "$RESULTS_FILE"

          for BS in 10 20 50; do
            for C in 20 40 60 80 100; do
              echo "--- batch_size=$BS  concurrency=$C ---"
              OUTPUT=$(BATCH_SIZE=$BS MAX_CONCURRENT=$C ./target/release/batch-blocks --slots-file slots.txt 2>&1) || true
              echo "$OUTPUT" | tail -20
              echo ""

              BPS=$(echo "$OUTPUT" | grep "Blocks/s:" | awk '{print $2}' || echo "0")
              BLOCKS_OK=$(echo "$OUTPUT" | grep "Blocks saved:" | awk '{print $3}' || echo "0")
              BATCHES_LINE=$(echo "$OUTPUT" | grep "Batches ok:" | head -1)
              BATCHES_OK=$(echo "$BATCHES_LINE" | grep -oP '\d+(?=/)' || echo "0")
              BATCHES_ERR=$(echo "$BATCHES_LINE" | grep -oP '\d+(?= err)' || echo "0")

              echo "${BS},${C},${BPS:-0},${BLOCKS_OK:-0},${BATCHES_OK:-0},${BATCHES_ERR:-0}" >> "$RESULTS_FILE"
              echo ""
            done
          done

          echo ""
          echo "============================================="
          echo "  Results Summary"
          echo "============================================="
          echo ""
          printf "%-8s %-12s %-12s %-12s %-10s\n" "Batch" "Concurrency" "Blocks/s" "Blocks OK" "Errors"
          printf "%-8s %-12s %-12s %-12s %-10s\n" "-----" "-----------" "--------" "---------" "------"

          BEST_BPS=0
          BEST_BS=""
          BEST_C=""

          tail -n +2 "$RESULTS_FILE" | while IFS=, read -r BS C BPS BOK BatchesOK BatchesErr; do
            printf "%-8s %-12s %-12s %-12s %-10s\n" "$BS" "$C" "$BPS" "$BOK" "$BatchesErr"
          done

          # Find best (outside subshell)
          BEST=$(tail -n +2 "$RESULTS_FILE" | awk -F, '$3+0 > max {max=$3+0; bs=$1; c=$2} END {printf "%s %s %s", bs, c, max}')
          BEST_BS=$(echo "$BEST" | awk '{print $1}')
          BEST_C=$(echo "$BEST" | awk '{print $2}')
          BEST_BPS=$(echo "$BEST" | awk '{print $3}')

          echo ""
          echo "Sweet spot: batch_size=$BEST_BS  concurrency=$BEST_C  →  $BEST_BPS blocks/s"
          echo ""

          rm -f "$RESULTS_FILE"
