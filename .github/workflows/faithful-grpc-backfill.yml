name: Faithful gRPC DEX Backfill

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  START_EPOCH: "800"
  END_EPOCH: "800"
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  OPENSSL_NO_VENDOR: "1"

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-22.04
    outputs:
      epochs: ${{ steps.gen_epochs.outputs.epochs }}
    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libudev-dev clang llvm-dev libclang-dev pkg-config libssl-dev cmake protobuf-compiler

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Build binary
        run: cargo build --release --bin dex-backfill-grpc

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: dex-backfill-grpc-binary
          path: target/release/dex-backfill-grpc
          retention-days: 30
          if-no-files-found: error

      - name: Generate epoch list
        id: gen_epochs
        run: |
          START=$START_EPOCH
          END=$END_EPOCH
          if [ "$START" -gt "$END" ]; then
            echo "Error: start_epoch ($START) > end_epoch ($END)"
            exit 1
          fi
          COUNT=$((END - START + 1))
          echo "Processing $COUNT epochs: $START to $END"
          EPOCHS=$(printf '%s\n' $(seq $START $END) | jq -R . | jq -sc .)
          echo "epochs=$EPOCHS" >> $GITHUB_OUTPUT

  backfill:
    name: Epoch ${{ matrix.epoch }}
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        epoch: ${{ fromJson(needs.build.outputs.epochs) }}
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: dex-backfill-grpc-binary

      - name: Make binary executable
        run: chmod +x dex-backfill-grpc

      - name: Download faithful-cli
        run: |
          curl -sL "https://github.com/rpcpool/yellowstone-faithful/releases/download/v0.7.24/faithful-cli_linux_amd64" -o faithful-cli
          chmod +x faithful-cli

      - name: Generate faithful-cli config
        run: |
          mkdir -p configs
          EPOCH=${{ matrix.epoch }}
          CID=$(curl -sf "https://files.old-faithful.net/${EPOCH}/epoch-${EPOCH}.cid" | tr -d '[:space:]')
          echo "Epoch $EPOCH CID: $CID"
          BASE="https://files.old-faithful.net/${EPOCH}/epoch-${EPOCH}"
          printf 'version: 1\nepoch: %s\ndata:\n  car:\n    uri: %s.car\nindexes:\n  cid_to_offset_and_size:\n    uri: %s-%s-mainnet-cid-to-offset-and-size.index\n  slot_to_cid:\n    uri: %s-%s-mainnet-slot-to-cid.index\n  sig_to_cid:\n    uri: %s-%s-mainnet-sig-to-cid.index\n  sig_exists:\n    uri: %s-%s-mainnet-sig-exists.index\n  slot_to_blocktime:\n    uri: %s-%s-mainnet-slot-to-blocktime.index\n' \
            "$EPOCH" "$BASE" "$BASE" "$CID" "$BASE" "$CID" "$BASE" "$CID" "$BASE" "$CID" "$BASE" "$CID" \
            > "configs/epoch-${EPOCH}.yml"
          cat "configs/epoch-${EPOCH}.yml"

      - name: Start faithful-cli RPC + gRPC server
        run: |
          mkdir -p output
          ./faithful-cli rpc \
            --listen=:8888 \
            --grpc-listen=:8889 \
            --epoch-load-concurrency=1 \
            configs/ > faithful.log 2>&1 &
          FAITHFUL_PID=$!
          echo "FAITHFUL_PID=$FAITHFUL_PID" >> $GITHUB_ENV

          echo "Waiting for faithful-cli to load indexes (may take several minutes)..."
          for i in $(seq 1 180); do
            if ! kill -0 $FAITHFUL_PID 2>/dev/null; then
              echo "ERROR: faithful-cli died! Last 50 lines of log:"
              tail -50 faithful.log
              exit 1
            fi
            if curl -sf http://127.0.0.1:8888 -X POST -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getFirstAvailableBlock"}' 2>/dev/null | grep -q "result"; then
              echo "faithful-cli is ready! (took ~$((i * 5))s)"
              break
            fi
            if [ $((i % 12)) -eq 0 ]; then
              echo "  Still loading... ($((i * 5))s elapsed)"
              tail -3 faithful.log
            fi
            sleep 5
          done

          # Final verification
          RESP=$(curl -sf http://127.0.0.1:8888 -X POST \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"getFirstAvailableBlock"}' 2>&1) || {
            echo "ERROR: faithful-cli not responding after wait"
            tail -20 faithful.log
            exit 1
          }
          echo "JSON-RPC Response: $RESP"

          # Verify gRPC port is listening
          if ss -tlnp | grep -q ":8889"; then
            echo "gRPC port 8889 is listening"
          else
            echo "WARNING: gRPC port 8889 not found in ss output:"
            ss -tlnp | grep -E "888[89]"
          fi

      - name: Compute slot range
        run: |
          EPOCH=${{ matrix.epoch }}
          START_SLOT=$((EPOCH * 432000))
          END_SLOT=$(((EPOCH + 1) * 432000))
          echo "START_SLOT=$START_SLOT" >> $GITHUB_ENV
          echo "END_SLOT=$END_SLOT" >> $GITHUB_ENV
          echo "Epoch $EPOCH: slots $START_SLOT..$END_SLOT"

      - name: Run JSON-RPC DEX backfill
        env:
          FAITHFUL_ENDPOINT: "http://127.0.0.1:8888"
          OUTPUT_DIR: "./output"
        run: |
          ./dex-backfill-grpc

      - name: Stop faithful-cli
        if: always()
        run: |
          if [ -n "$FAITHFUL_PID" ]; then
            kill $FAITHFUL_PID 2>/dev/null || true
          fi

      - name: Count results
        run: |
          if [ -f output/ohlcv.csv ]; then
            LINES=$(wc -l < output/ohlcv.csv)
            echo "OHLCV rows: $((LINES - 1))"
          else
            echo "No OHLCV output found"
          fi

      - name: Upload epoch data
        uses: actions/upload-artifact@v4
        with:
          name: epoch-${{ matrix.epoch }}
          path: output/
          retention-days: 7
          if-no-files-found: warn

  release:
    name: Archive results
    needs: backfill
    runs-on: ubuntu-22.04
    if: success()
    steps:
      - name: Download all epoch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: epoch-*
          merge-multiple: true
          path: all-epochs

      - name: Merge OHLCV CSVs
        run: |
          mkdir -p merged
          echo "slot,block_time,open,high,low,close,volume,num_trades,buy_volume,sell_volume" > merged/ohlcv.csv
          for f in all-epochs/ohlcv.csv; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> merged/ohlcv.csv
            fi
          done
          TOTAL=$(wc -l < merged/ohlcv.csv)
          echo "Total OHLCV rows: $((TOTAL - 1))"

      - name: Create release zip
        run: |
          START=$START_EPOCH
          END=$END_EPOCH
          ZIPNAME="faithful-dex-${START}-${END}.zip"
          cd merged
          zip -r "../${ZIPNAME}" .
          cd ..
          echo "ZIPNAME=${ZIPNAME}" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: faithful-dex-${{ env.START_EPOCH }}-${{ env.END_EPOCH }}
          name: Faithful DEX Backfill ${{ env.START_EPOCH }}-${{ env.END_EPOCH }}
          body: |
            gRPC DEX backfill using Old Faithful for epochs ${{ env.START_EPOCH }} to ${{ env.END_EPOCH }}
          files: ${{ env.ZIPNAME }}
          fail_on_unmatched_files: false
