name: Bun Solana Backfill

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  bun-backfill:
    runs-on: ubuntu-latest
    env:
      KEY_1: ${{ secrets.KEY_1 }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run backfill (Bun)
        run: |
          cd bun-solana-backfill
          bun run index.ts \
            --start ${{ github.run_id }} \
            --end $(( ${{ github.run_id }} + 999 )) \
            --batch 20 \
            --concur 20 \
            --tx full \
            --out ./runner.ndjson.gz \
            --rpc "http://la.rpc.orbitflare.com" \
            --api-key "$KEY_1"
          echo "--- verify ---"
          ls -lh ./runner.ndjson.gz
          file ./runner.ndjson.gz
